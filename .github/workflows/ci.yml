name: CI

on:
  push:
    branches:
      - "**"
    paths:
      - ".github/workflows/**"
      - "Taskfile.yaml"
      - "configuration/**"
      - "services/evaluator/**"

jobs:
  evaluator:
    name: Evaluator
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/evaluator/package-lock.json

      - name: Set up Task
        uses: arduino/setup-task@v2

      - name: Install evaluator dependencies
        working-directory: services/evaluator
        run: npm ci

      - name: Lint
        run: task lint

      - name: Test
        run: task test
