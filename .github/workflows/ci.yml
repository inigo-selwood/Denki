name: CI

on:
  push:
    branches:
      - "**"
    paths:
      - ".github/workflows/**"
      - "Taskfile.yaml"
      - "configuration/**"
      - "services/evaluator/**"
      - "services/ingestor/**"

jobs:
  services:
    name: Services
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/evaluator/setup/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/ingestor/setup/pyproject.toml

      - name: Set up Task
        uses: arduino/setup-task@v2

      - name: Install ingestor system dependencies
        run: >-
          sudo apt-get update
          && sudo apt-get install --yes
          libgl1
          libglib2.0-0
          libgomp1

      - name: Install evaluator dependencies
        working-directory: services/evaluator
        run: >-
          npm --prefix setup ci
          && rm -rf node_modules
          && ln -sfn setup/node_modules node_modules

      - name: Install ingestor dependencies
        run: task ingestor:setup

      - name: Lint
        run: task lint

      - name: Test
        run: task test
