version: "3"

env:
  ENVIRONMENT: "development"

  EVALUATOR_PORT: "3000"

  INGESTOR_PORT: "8000"
  INGESTOR_URL: "http://127.0.0.1:8000"

  ASSESSOR_PORT: "9000"

  DATABASE_PORT: "54322"
  DATABASE_USER: "postgres"
  DATABASE_PASSWORD: "postgres"

includes:
  database:
    taskfile: ./database/Taskfile.yaml
    dir: ./database

  evaluator:
    taskfile: ./services/evaluator/Taskfile.yaml
    dir: ./services/evaluator

  ingestor:
    taskfile: ./services/ingestor/Taskfile.yaml
    dir: ./services/ingestor

  assessor:
    taskfile: ./services/assessor/Taskfile.yaml
    dir: ./services/assessor

tasks:
  clean:
    desc: Clean root-managed local artifacts
    cmds:
      - task database:clean
      - task evaluator:clean
      - task ingestor:clean
      - task assessor:clean

  lint:
    desc: Run lint checks across services
    cmds:
      - task evaluator:lint
      - task ingestor:lint
      - task assessor:lint

  test:
    desc: Run tests across services
    cmds:
      - task evaluator:test
      - task ingestor:test
      - task assessor:test
