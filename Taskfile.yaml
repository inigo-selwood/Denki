version: "3"

env:
  ENVIRONMENT: "development"

  EVALUATOR_PORT: "3000"

  INGESTOR_PORT: "8000"
  INGESTOR_URL: "http://127.0.0.1:8000"

  ASSESSOR_PORT: "9000"

  DATABASE_PORT: "54322"
  DATABASE_USER: "postgres"
  DATABASE_PASSWORD: "postgres"

tasks:
  run:
    desc: Run the local service stack
    cmds:
      - task -d database start
      - >-
        if docker compose version >/dev/null 2>&1; then
          docker compose -f deployment/local/docker-compose.yml up --build;
        elif command -v docker-compose >/dev/null 2>&1; then
          docker-compose -f deployment/local/docker-compose.yml up --build;
        else
          echo "Docker Compose is required to run the local service stack.";
          exit 1;
        fi

  clean:
    desc: Clean root-managed local artifacts
    cmds:
      - >-
        if docker compose version >/dev/null 2>&1; then
          docker compose -f deployment/local/docker-compose.yml down --remove-orphans;
        elif command -v docker-compose >/dev/null 2>&1; then
          docker-compose -f deployment/local/docker-compose.yml down --remove-orphans;
        fi
      - task -d database clean
      - task -d services/evaluator clean
      - task -d services/ingestor clean
      - task -d services/assessor clean

  lint:
    desc: Run lint checks across services
    cmds:
      - task -d services/evaluator lint
      - task -d services/ingestor lint
      - task -d services/assessor lint

  test:
    desc: Run tests across services
    cmds:
      - task -d services/evaluator test
      - task -d services/ingestor test
      - task -d services/assessor test
