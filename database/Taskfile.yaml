version: "3"

tasks:
  setup:
    internal: true
    silent: true
    run: once
    cmds:
      - npm ci
      - touch .setup.stamp
    status:
      - test -d node_modules
      - test -f node_modules/.package-lock.json
      - test .setup.stamp -nt package.json
      - test .setup.stamp -nt package-lock.json

  test:
    desc: Run an ephemeral blank local Supabase database lifecycle
    deps:
      - setup
    cmds:
      - task: start
      - defer: { task: stop }
      - task: reset

  start:
    desc: Start the database service local Supabase database
    deps:
      - setup
    cmds:
      - npm exec supabase -- db start

  reset:
    desc: Reset the database service local Supabase database
    deps:
      - setup
    cmds:
      - task: start
      - npm exec supabase -- db reset

  clean:
    desc: Remove local Supabase containers and data
    cmds:
      - >-
        if [ -x node_modules/.bin/supabase ]; then
        npm exec supabase -- stop --no-backup;
        fi
      - rm -rf node_modules .setup.stamp

  stop:
    desc: Stop the database service local Supabase stack without keeping data
    deps:
      - setup
    cmds:
      - npm exec supabase -- stop --no-backup
