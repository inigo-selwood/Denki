version: "3"

env:
  ENVIRONMENT: "development"
  ASSESSOR_PORT: "9000"

tasks:
  docs:
    desc: Run the assessor service and open the API docs
    deps:
      - setup
    cmds:
      - >-
        .venv/bin/python -m source.main serve
        --host 127.0.0.1
        --port $ASSESSOR_PORT &
        server_pid=$!;
        trap "kill $server_pid" EXIT;
        sleep 2;
        .venv/bin/python -m webbrowser
        http://127.0.0.1:$ASSESSOR_PORT/docs;
        wait $server_pid

  run-cli:
    desc: Run the assessor CLI with forwarded arguments
    deps:
      - setup
    cmds:
      - .venv/bin/python -m source.main {{.CLI_ARGS}}

  run-local:
    desc: Run the assessor FastAPI service locally with Uvicorn
    deps:
      - setup
    cmds:
      - >-
        .venv/bin/python -m source.main serve
        --host 0.0.0.0
        --port $ASSESSOR_PORT

  run-docker:
    desc: Build and run the assessor FastAPI Docker container
    deps:
      - build
    cmds:
      - >-
        docker run --rm
        --env ENVIRONMENT=local
        --env ASSESSOR_PORT=$ASSESSOR_PORT
        --publish $ASSESSOR_PORT:$ASSESSOR_PORT
        denki/assessor:latest

  test:
    desc: Run the assessor service test suite
    cmds:
      - task test:unit
      - task test:integration

  test:unit:
    desc: Run the assessor service unit test suite
    deps:
      - setup
    cmds:
      - .venv/bin/python -m pytest -c setup/pyproject.toml test/unit

  test:integration:
    desc: Run the assessor service integration test suite
    deps:
      - setup
    cmds:
      - .venv/bin/python -m pytest -c setup/pyproject.toml test/integration

  setup:
    internal: true
    silent: true
    run: once
    cmds:
      - python3 -m venv .venv
      - >-
        .venv/bin/python -m pip install
        --editable "./setup[dev]"
      - touch .venv/.setup.stamp
    status:
      - test -x .venv/bin/python
      - test -x .venv/bin/pip
      - test .venv/.setup.stamp -nt setup/pyproject.toml

  lint:
    desc: Run assessor service lint checks
    deps:
      - setup
    cmds:
      - .venv/bin/python -m black --config setup/pyproject.toml --check .
      - .venv/bin/python -m ruff check --config setup/pyproject.toml .

  format:
    internal: true
    deps:
      - setup
    cmds:
      - .venv/bin/python -m black --config setup/pyproject.toml .

  build:
    internal: true
    deps:
      - format
    cmds:
      - docker build --tag denki/assessor:latest .

  clean:
    desc: Remove generated assessor service artifacts
    cmds:
      - >-
        rm -rf
        .cache
        .pytest_cache
        .ruff_cache
        .venv
        build
        dist
        denki_assessor.egg-info
        setup/.pytest_cache
      - find . -type d -name __pycache__ -prune -exec rm -rf {} +
