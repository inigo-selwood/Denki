version: "3"

tasks:
  lint:
    desc: Run assessor service lint checks
    deps:
      - setup
    cmds:
      - .venv/bin/python -m black --config setup/pyproject.toml --check .
      - .venv/bin/python -m ruff check --config setup/pyproject.toml .

  format:
    internal: true
    deps:
      - setup
    cmds:
      - .venv/bin/python -m black --config setup/pyproject.toml .
