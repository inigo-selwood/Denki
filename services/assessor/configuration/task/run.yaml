version: "3"

tasks:
  docs:
    desc: Run the assessor service and open the API docs
    deps:
      - setup
    cmds:
      - >-
        .venv/bin/python -m source.main serve
        --host 127.0.0.1
        --port $ASSESSOR_PORT &
        server_pid=$!;
        trap "kill $server_pid" EXIT;
        sleep 2;
        .venv/bin/python -m webbrowser
        http://127.0.0.1:$ASSESSOR_PORT/docs;
        wait $server_pid

  invoke:
    desc: Run the assessor command entrypoint with forwarded arguments
    deps:
      - setup
    cmds:
      - .venv/bin/python -m source.main {{.CLI_ARGS}}

  debug:
    desc: Run the assessor FastAPI service on the host
    deps:
      - setup
    cmds:
      - >-
        .venv/bin/python -m source.main serve
        --host 0.0.0.0
        --port $ASSESSOR_PORT

  run:
    desc: Build and run the assessor FastAPI container locally
    deps:
      - build
    cmds:
      - >-
        docker run --rm
        --env ENVIRONMENT=local
        --env ASSESSOR_PORT=$ASSESSOR_PORT
        --publish $ASSESSOR_PORT:$ASSESSOR_PORT
        denki/assessor:latest
