version: "3"

includes:
  database:
    taskfile: ../../database/Taskfile.yaml
    dir: ../../database

tasks:
  lint:
    desc: Run evaluator service lint checks
    cmds:
      - npm run format:check
      - npm run typecheck

  run-local:
    desc: Run the evaluator service locally
    dotenv:
      - .env
    cmds:
      - npm run dev

  run-docker:
    desc: Build and run the evaluator Docker container with local env
    dotenv:
      - .env
    deps:
      - build
    cmds:
      - docker run --rm --env-file .env --env ENVIRONMENT=local --env
        EVALUATOR_PORT=$EVALUATOR_PORT --env DATABASE_PORT=$DATABASE_PORT --env
        DATABASE_USER=$DATABASE_USER --env DATABASE_PASSWORD=$DATABASE_PASSWORD
        --publish $EVALUATOR_PORT:$EVALUATOR_PORT denki/evaluator:latest

  build:
    desc: Build the evaluator service Docker image
    cmds:
      - docker build --tag denki/evaluator:latest .

  test:
    desc: Run the evaluator service test suite with database schema checks
    dotenv:
      - .env
    cmds:
      - task database:start
      - defer: { task: database:stop }
      - task database:reset
      - npm run db:push
      - npm test

  clean:
    desc: Remove generated evaluator service artifacts
    cmds:
      - rm -rf build
