version: "3"

env:
  ENVIRONMENT: "development"
  INGESTOR_PORT: "8000"

tasks:
  setup:
    desc: Install ingestor service dependencies
    cmds:
      - python3 -m venv .venv
      - >-
        .venv/bin/python -m pip install
        --editable ".[dev]"

  lint:
    desc: Run ingestor service lint checks
    cmds:
      - .venv/bin/python -m black --check .
      - .venv/bin/python -m ruff check .

  format:
    desc: Format ingestor service source files
    cmds:
      - .venv/bin/python -m black .

  run-local:
    desc: Run the ingestor FastAPI service locally with Uvicorn
    cmds:
      - >-
        .venv/bin/python -m uvicorn source.main:run
        --factory
        --host 0.0.0.0
        --port $INGESTOR_PORT

  run-docker:
    desc: Build and run the ingestor FastAPI Docker container
    deps:
      - build
    cmds:
      - >-
        docker run --rm
        --env ENVIRONMENT=local
        --env INGESTOR_PORT=$INGESTOR_PORT
        --publish $INGESTOR_PORT:$INGESTOR_PORT
        denki/ingestor:latest

  build:
    desc: Build the ingestor service Docker image
    deps:
      - format
    cmds:
      - docker build --tag denki/ingestor:latest .

  test:
    desc: Run the ingestor service test suite
    cmds:
      - .venv/bin/python -m pytest

  clean:
    desc: Remove generated ingestor service artifacts
    cmds:
      - rm -rf .pytest_cache .ruff_cache build dist
