version: "3"

tasks:
  test:
    desc: Run the ingestor service test suite
    cmds:
      - task test:unit
      - task test:integration

  test:unit:
    desc: Run the ingestor service unit test suite
    deps:
      - setup
    cmds:
      - .venv/bin/python -m pytest -c setup/pyproject.toml test/unit

  test:integration:
    desc: Run the ingestor service integration test suite
    deps:
      - setup
    cmds:
      - >-
        RUN_INGESTOR_INTEGRATION=1
        .venv/bin/python -m pytest -c setup/pyproject.toml test/integration
